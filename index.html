<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./asserts/css/bootstrap.min.css">
    <link rel="stylesheet" href="./asserts/css/style.css">
</head>
<body>

    <header class="navbar bg-while border-bottom px-3">
        <button id="toggleSidebar" class="btn btn-outline-secondary">
            <i class="bi bi-list"></i>
        </button>
        <span class="nav-brand ms-2">UMFG</span>
    </header>

    <div class="layout">
        <aside id="sidebar" class="sidebar">
            <a class="menu-item">
                <i class="bi bi-speedometer"></i>
                <span>Dashboard</span>
            </a>
            <a class="menu-item active">
                <i class="bi bi-people"></i>
                <span>Pessoa</span>
            </a>
        </aside>
        <main class="container" style="position: relative;">
            <h1 class="h4">Pessoa</h1>
            <button style="position: absolute; top:0; right: 0" class="btn btn-primary" id="btnAdicionar">Cadastrar</button>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th style="width: 120px;">#</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr>
                        <td>Diogo</td>
                        <td>diog@dfd.com.br</td>
                        <td>
                            <button class="btn btn-outline-info"><i class="bi bi-pen"></i></button>
                            <button class="btn btn-outline-danger"><i class="bi bi-trash3"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>

        <div class="modal" tabindex="-1" id="exampleModal">
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="modalTitle">Modal title</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-floating mb-3">
                        <input type="text" name="nome" id="nomeInput" class="form-control" placeholder="name@example.com">
                        <label>Nome Completo</label>
                    </div>
                    <div class="form-floating">
                        <input type="email" name="email" id="emailInput" class="form-control" placeholder="E-mail">
                        <label>E-amil</label>
                    </div>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                  <button type="button" class="btn btn-primary">Save changes</button>
                </div>
              </div>
            </div>
        </div>
    </div>
    
    <script src="./asserts/js/bootstrap.min.js"></script>
    <script src="./asserts/js/main.js"></script>
    <script src="./asserts/js/pessoa.js"></script>
</body>
</html>
